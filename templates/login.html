{% extends "base.html" %}
{% block title %} — Login{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-4">
    <div class="card p-4">
      <h4 class="mb-4 text-center"><i class="bi bi-mortarboard-fill me-2 text-navy"></i>Training Portal</h4>
      <form method="POST">
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control" required autofocus/>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" required/>
        </div>
        <button class="btn btn-navy w-100">Login</button>
      </form>
      <div class="text-center mt-3 small">
        No account? <a href="{{ url_for('register') }}">Register</a>
      </div>
      <hr/>
      <div class="small text-muted">
        <strong>Demo:</strong><br/>
        HR: hr@drdo.in / Hr@1234<br/>
        Employee: ayushi@drdo.in / Ayushi@1234
      </div>
    </div>
  </div>
</div>
{% endblock %}
